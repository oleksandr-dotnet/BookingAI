services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: bookingsystemai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-booking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-booking}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bookingsystemai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  bookingsystemai_pgdata:
